<!doctype html>
<html lang="ja">
  <head prefix="og: http://ogp.me/ns# website: http://ogp.me/ns/websaite#">
    <meta charset="utf-8" />
    <title>404 | こめっと</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="title" content="404 | こめっと" />
    <meta name="description" content="ページが見つかりませんでした。トップページへご案内します。" />
    <meta name="theme-color" content="#050810" />
    <link rel="canonical" href="https://aecomet.github.io/" />
    <link rel="icon" href="https://aecomet.github.io/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #050810;
        --surface: rgba(10, 15, 30, 0.78);
        --accent1: #00f5c4;
        --accent2: #7b5ea7;
        --text: #e8eaf6;
        --muted: #b8bec8;
        --border: rgba(0, 245, 196, 0.14);
        --glow: rgba(0, 245, 196, 0.24);
        --panel-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        --card-width: min(720px, calc(100vw - 3rem));
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(123, 94, 167, 0.22), transparent 28%),
          radial-gradient(circle at 80% 0%, rgba(0, 245, 196, 0.12), transparent 30%),
          linear-gradient(180deg, #060916 0%, #050810 55%, #03050a 100%);
        color: var(--text);
        font-family: 'Noto Sans JP', sans-serif;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.4;
        pointer-events: none;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(circle at 10% 15%, rgba(255, 255, 255, 0.9) 0 1px, transparent 1.4px),
          radial-gradient(circle at 75% 25%, rgba(255, 255, 255, 0.7) 0 1.2px, transparent 1.6px),
          radial-gradient(circle at 32% 72%, rgba(255, 255, 255, 0.65) 0 1px, transparent 1.5px),
          radial-gradient(circle at 88% 72%, rgba(255, 255, 255, 0.8) 0 1.2px, transparent 1.6px),
          radial-gradient(circle at 56% 48%, rgba(0, 245, 196, 0.6) 0 1px, transparent 1.5px);
        animation: twinkle 7s ease-in-out infinite alternate;
        opacity: 0.75;
        pointer-events: none;
      }

      @keyframes twinkle {
        from {
          transform: scale(1);
          opacity: 0.45;
        }

        to {
          transform: scale(1.03);
          opacity: 0.85;
        }
      }

      .shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      main {
        flex: 1;
        display: grid;
        place-items: center;
        padding: 3rem 1.5rem 4rem;
      }

      .hero-card {
        width: var(--card-width);
        padding: 3.5rem 3rem;
        text-align: center;
        background: linear-gradient(180deg, rgba(10, 15, 30, 0.88) 0%, rgba(5, 8, 16, 0.78) 100%);
        border: 1px solid var(--border);
        box-shadow: var(--panel-shadow);
        backdrop-filter: blur(16px);
      }

      .hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.4rem 1rem;
        margin-bottom: 2rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: rgba(0, 245, 196, 0.06);
        color: var(--accent1);
        font-family: 'DM Mono', monospace;
        font-size: 0.72rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      .hero-illustration {
        width: min(320px, 68vw);
        margin: 0 auto 1.8rem;
        filter: drop-shadow(0 0 30px rgba(0, 245, 196, 0.18));
      }

      .hero-illustration svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .hero-badge::before {
        content: '◉';
        font-size: 0.6rem;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }

        50% {
          opacity: 0.25;
        }
      }

      h1 {
        margin: 0;
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: clamp(3.6rem, 12vw, 6.8rem);
        line-height: 0.92;
        letter-spacing: -0.03em;
      }

      .outline {
        display: block;
        color: transparent;
        -webkit-text-stroke: 1px var(--accent1);
      }

      .subtitle {
        margin: 1.8rem 0 1rem;
        color: var(--muted);
        font-family: 'Syne', sans-serif;
        font-size: 0.96rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
      }

      .description {
        max-width: 34rem;
        margin: 0 auto;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.9;
      }

      .cta-group {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin: 1.5rem 0;
      }

      .cta-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 220px;
        padding: 0.95rem 2.2rem;
        font-family: 'DM Mono', monospace;
        font-size: 0.8rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        text-decoration: none;
        transition: all 0.3s ease;
      }

      .cta-link.primary {
        color: var(--bg);
        background: var(--accent1);
        clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      }

      .cta-link.primary:hover {
        background: #ffffff;
        box-shadow: 0 0 30px var(--glow);
      }

      .cta-link.secondary {
        color: var(--accent1);
        border: 1px solid var(--border);
        background: rgba(0, 245, 196, 0.04);
      }

      .cta-link.secondary:hover {
        border-color: var(--accent1);
        background: rgba(0, 245, 196, 0.08);
      }

      @media (max-width: 640px) {
        .hero-card {
          padding: 2.75rem 1.5rem;
        }

        .cta-link {
          width: 100%;
          min-width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <main>
        <section class="hero-card" aria-labelledby="page-title">
          <div class="hero-badge">Page Not Found</div>
          <div class="hero-illustration" aria-hidden="true">
            <svg viewBox="0 0 360 220" role="img" focusable="false">
              <defs>
                <linearGradient id="planet-gradient" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#00f5c4" stop-opacity="0.95" />
                  <stop offset="100%" stop-color="#7b5ea7" stop-opacity="0.9" />
                </linearGradient>
                <radialGradient id="glow-gradient" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#00f5c4" stop-opacity="0.3" />
                  <stop offset="100%" stop-color="#00f5c4" stop-opacity="0" />
                </radialGradient>
              </defs>

              <ellipse cx="180" cy="110" rx="126" ry="74" fill="url(#glow-gradient)" />
              <circle cx="180" cy="108" r="52" fill="url(#planet-gradient)" />
              <ellipse cx="180" cy="108" rx="96" ry="22" fill="none" stroke="rgba(232,234,246,0.55)" stroke-width="5" />
              <ellipse cx="180" cy="108" rx="96" ry="22" fill="none" stroke="rgba(0,245,196,0.35)" stroke-width="1.2" />

              <circle cx="77" cy="66" r="2.3" fill="#e8eaf6" />
              <circle cx="92" cy="142" r="1.8" fill="#e8eaf6" />
              <circle cx="264" cy="54" r="2.4" fill="#e8eaf6" />
              <circle cx="288" cy="148" r="1.9" fill="#e8eaf6" />

              <path d="M114 172 L245 172" stroke="rgba(0,245,196,0.55)" stroke-width="2" stroke-linecap="round" />
              <path d="M128 184 L232 184" stroke="rgba(232,234,246,0.35)" stroke-width="1.6" stroke-linecap="round" />
            </svg>
          </div>
          <p class="description">
            お探しのページは存在しないか、移動された可能性があります。 トップページへ戻って再度アクセスしてください。
          </p>
          <div class="cta-group">
            <a class="cta-link primary" href="https://aecomet.github.io/">トップページへ移動</a>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
